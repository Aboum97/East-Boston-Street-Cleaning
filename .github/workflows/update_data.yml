name: Update street data

on:
  schedule:
    - cron: '0 8 * * *'   # 8am UTC daily (before the 11am alert runs)
  workflow_dispatch:        # manual trigger

permissions:
  contents: write           # needed to commit data/east-boston.json

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: alert/requirements.txt

      - name: Install dependencies
        run: pip install -r alert/requirements.txt

      - name: Fetch and save East Boston data
        run: python scripts/update_data.py

      - name: Commit updated data file
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/east-boston.json
          git diff --cached --quiet || git commit -m "chore: update street cleaning data [$(date -u +%Y-%m-%d)]"
          git push
