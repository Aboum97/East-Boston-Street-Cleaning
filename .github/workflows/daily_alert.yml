name: Daily Street Cleaning Alert

on:
  schedule:
    # 7:00 AM EST = 12:00 UTC (standard time)
    # 7:00 AM EDT = 11:00 UTC (daylight saving — adjust April–November)
    - cron: '0 11 * * *'
  workflow_dispatch:   # allows manual trigger from the Actions tab

jobs:
  send-alert:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: alert/requirements.txt

      - name: Install dependencies
        run: pip install -r alert/requirements.txt

      - name: Run alert script
        env:
          GMAIL_USER:        ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          ALERT_EMAIL:       ${{ secrets.ALERT_EMAIL }}
        run: python alert/alert.py
