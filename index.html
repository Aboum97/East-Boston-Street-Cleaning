<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>East Boston Street Cleaning</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --navy:   #1B2A4A;
      --navy-l: #243660;
      --odd:    #E8782A;
      --odd-l:  #FDF0E6;
      --even:   #1A8C68;
      --even-l: #E3F5EF;
      --bg:     #F4F3EE;
      --card:   #FFFFFF;
      --border: #E0DED6;
      --text:   #1A1A1A;
      --muted:  #6B6860;
      --accent: #D44C2B;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ── Header ── */
    header {
      background: var(--navy);
      color: #fff;
      padding: 0 1.5rem;
    }
    .header-inner {
      max-width: 1100px;
      margin: 0 auto;
      padding: 1.25rem 0;
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 1rem;
      flex-wrap: wrap;
    }
    .header-title h1 {
      font-size: 1.25rem;
      font-weight: 600;
      letter-spacing: -0.02em;
    }
    .header-title p {
      font-size: 0.8rem;
      color: rgba(255,255,255,0.55);
      margin-top: 3px;
      font-family: 'DM Mono', monospace;
    }
    .season-badge {
      font-size: 0.72rem;
      font-family: 'DM Mono', monospace;
      padding: 4px 10px;
      border-radius: 20px;
      font-weight: 500;
      margin-top: 6px;
      display: inline-block;
    }
    .season-active  { background: #1A8C68; color: #fff; }
    .season-inactive { background: #6B6860; color: #fff; }

    /* ── Filters ── */
    .filters-wrap {
      background: var(--navy-l);
      border-bottom: 1px solid rgba(255,255,255,0.06);
      padding: 0 1.5rem;
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .filters-inner {
      max-width: 1100px;
      margin: 0 auto;
      padding: 0.75rem 0;
      display: flex;
      gap: 12px;
      align-items: center;
      flex-wrap: wrap;
    }

    /* Week navigation */
    .week-nav {
      display: flex;
      gap: 8px;
      align-items: center;
      margin-right: 12px;
    }
    .week-nav-btn {
      font-family: 'DM Mono', monospace;
      font-size: 0.7rem;
      padding: 5px 10px;
      border-radius: 6px;
      border: 1px solid rgba(255,255,255,0.2);
      background: transparent;
      color: rgba(255,255,255,0.7);
      cursor: pointer;
      transition: all 0.15s;
    }
    .week-nav-btn:hover {
      background: rgba(255,255,255,0.1);
      color: #fff;
    }

    .filter-group { display: flex; gap: 4px; flex-wrap: wrap; }
    .filter-label {
      font-size: 0.7rem;
      font-family: 'DM Mono', monospace;
      color: rgba(255,255,255,0.4);
      align-self: center;
      margin-right: 2px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }
    .day-btn, .side-btn {
      font-family: 'DM Mono', monospace;
      font-size: 0.68rem;
      padding: 6px 10px;
      border-radius: 6px;
      border: 1px solid rgba(255,255,255,0.15);
      background: transparent;
      color: rgba(255,255,255,0.65);
      cursor: pointer;
      transition: all 0.15s;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
      line-height: 1.2;
    }
    .day-btn:hover, .side-btn:hover {
      background: rgba(255,255,255,0.1);
      color: #fff;
    }
    .day-btn.active {
      background: #fff;
      color: var(--navy);
      border-color: #fff;
      font-weight: 500;
    }
    .day-btn.today-btn {
      border-color: var(--accent);
      border-width: 2px;
      color: #ffb89a;
    }
    .day-btn.today-btn.active {
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
    }
    .day-date {
      font-size: 0.65rem;
      opacity: 0.75;
    }
    .today-badge {
      font-size: 0.5rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--accent);
      font-weight: 600;
    }
    .day-btn.today-btn.active .today-badge {
      color: #fff;
    }
    .side-btn.active-odd  { background: var(--odd);   color: #fff; border-color: var(--odd); }
    .side-btn.active-even { background: var(--even);  color: #fff; border-color: var(--even); }
    .side-btn.active-all  { background: rgba(255,255,255,0.2); color: #fff; }

    /* ── Main ── */
    main {
      max-width: 1100px;
      margin: 0 auto;
      padding: 1.5rem 1.5rem 3rem;
    }

    /* ── Status bar ── */
    .status-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1.25rem;
      flex-wrap: wrap;
      gap: 8px;
    }
    .status-count {
      font-size: 0.82rem;
      color: var(--muted);
      font-family: 'DM Mono', monospace;
    }
    .status-count strong { color: var(--text); }
    .data-source {
      font-size: 0.7rem;
      color: var(--muted);
      font-family: 'DM Mono', monospace;
    }
    .data-source a { color: var(--muted); }

    /* ── Loading / error ── */
    .state-msg {
      text-align: center;
      padding: 4rem 1rem;
      color: var(--muted);
      font-family: 'DM Mono', monospace;
      font-size: 0.85rem;
    }
    .state-msg .big { font-size: 2rem; margin-bottom: 0.75rem; }

    /* ── Street grid ── */
    .street-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 10px;
    }

    /* ── Street card ── */
    .street-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 14px 16px;
      border-left: 4px solid var(--border);
      transition: all 0.15s;
      cursor: pointer;
      position: relative;
    }
    .street-card:hover {
      box-shadow: 0 2px 12px rgba(0,0,0,0.07);
      transform: translateY(-1px);
    }
    .street-card.odd-side  { border-left-color: var(--odd); }
    .street-card.even-side { border-left-color: var(--even); }
    .street-card.both-side { border-left-color: var(--navy); }

    /* Today highlight */
    .street-card.cleaning-today {
      background: linear-gradient(to right, #fff9f5 0%, #ffffff 100%);
      border: 2px solid var(--accent);
      border-left: 4px solid var(--accent);
    }
    .street-card.cleaning-today.odd-side { border-left-color: var(--accent); }
    .street-card.cleaning-today.even-side { border-left-color: var(--accent); }
    .street-card.cleaning-today.both-side { border-left-color: var(--accent); }

    .today-flag {
      position: absolute;
      top: 8px;
      right: 8px;
      background: var(--accent);
      color: #fff;
      font-size: 0.55rem;
      font-weight: 600;
      font-family: 'DM Mono', monospace;
      padding: 3px 8px;
      border-radius: 12px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.7; }
    }

    .card-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 8px;
    }
    .street-name {
      font-family: 'DM Mono', monospace;
      font-weight: 500;
      font-size: 0.92rem;
      color: var(--text);
      line-height: 1.3;
      flex: 1;
    }
    .side-pill {
      font-family: 'DM Mono', monospace;
      font-size: 0.65rem;
      font-weight: 500;
      padding: 3px 8px;
      border-radius: 20px;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .pill-odd  { background: var(--odd-l);  color: #A0521A; }
    .pill-even { background: var(--even-l); color: #0F6E52; }
    .pill-both { background: #EEF0F5;       color: var(--navy); }

    .card-detail {
      font-size: 0.75rem;
      color: var(--muted);
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .detail-row {
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .detail-icon { font-size: 0.75rem; opacity: 0.6; width: 14px; }
    .detail-text { font-family: 'DM Mono', monospace; }
    .freq-chip {
      font-size: 0.62rem;
      font-family: 'DM Mono', monospace;
      padding: 1px 6px;
      background: #F0EFE8;
      border-radius: 4px;
      color: var(--muted);
      margin-top: 2px;
      display: inline-block;
    }

    /* Expandable card details */
    .card-expanded-details {
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.3s ease;
      margin-top: 8px;
      padding-top: 0;
      border-top: 1px solid transparent;
    }
    .street-card.expanded .card-expanded-details {
      max-height: 200px;
      padding-top: 8px;
      border-top-color: var(--border);
    }
    .expand-indicator {
      font-size: 0.7rem;
      color: var(--muted);
      text-align: center;
      margin-top: 6px;
      font-family: 'DM Mono', monospace;
    }
    .street-card.expanded .expand-indicator::before {
      content: '▲ ';
    }
    .street-card:not(.expanded) .expand-indicator::before {
      content: '▼ ';
    }

    /* ── Empty state ── */
    .empty {
      grid-column: 1 / -1;
      text-align: center;
      padding: 3rem;
      color: var(--muted);
      font-family: 'DM Mono', monospace;
      font-size: 0.82rem;
    }

    /* ── Footer ── */
    footer {
      text-align: center;
      padding: 1.5rem;
      font-size: 0.72rem;
      color: var(--muted);
      font-family: 'DM Mono', monospace;
      border-top: 1px solid var(--border);
    }
    footer a { color: var(--muted); }

    @media (max-width: 768px) {
      .filters-inner { gap: 8px; }
      .day-btn { font-size: 0.65rem; padding: 5px 8px; }
      .street-grid { grid-template-columns: 1fr; }
      .week-nav { width: 100%; justify-content: space-between; }
    }
  </style>
</head>
<body>

<header>
  <div class="header-inner">
    <div class="header-title">
      <h1>🧹 East Boston Street Cleaning</h1>
      <p id="today-label">Loading schedule…</p>
    </div>
    <span id="season-badge" class="season-badge"></span>
  </div>
</header>

<div class="filters-wrap">
  <div class="filters-inner">
    <div class="week-nav">
      <button class="week-nav-btn" id="prev-week">← Prev</button>
      <button class="week-nav-btn" id="next-week">Next →</button>
    </div>
    <span class="filter-label">Day</span>
    <div class="filter-group" id="day-filters"></div>
    <span class="filter-label" style="margin-left:8px">Side</span>
    <div class="filter-group" id="side-filters"></div>
  </div>
</div>

<main>
  <div class="status-bar">
    <span class="status-count" id="status-count">—</span>
    <span class="data-source">
      Source: <a href="https://data.boston.gov/dataset/street-sweeping-schedules" target="_blank">City of Boston Open Data</a>
      · <span id="last-updated">—</span>
    </span>
  </div>
  <div id="content">
    <div class="state-msg">
      <div class="big">⏳</div>
      Fetching schedule from Boston Open Data…
    </div>
  </div>
</main>

<footer>
  Data: City of Boston Street Sweeping Schedules (PDDL License) ·
  Program runs April 1 – November 30 ·
  <a href="https://github.com/Aboum97/East-Boston-Street-Cleaning" target="_blank">GitHub</a>
</footer>

<script>
// ── Constants ──────────────────────────────────────────────────────────────
const DATA_URL   = './data/east-boston.json';
const DAYS       = ['sunday','monday','tuesday','wednesday','thursday','friday','saturday'];
const DAY_LABELS = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
const DAY_FULL   = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
const MONTHS     = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
const MONTHS_ACTIVE = [4,5,6,7,8,9,10,11]; // April (4) – November (11)

// ── State ──────────────────────────────────────────────────────────────────
let allStreets   = [];
let selectedDayIndex = 0; // Index in the 7-day view (0-6)
let selectedSide = 'all';
let weekOffset   = 0; // 0 = current week starting from today
const today      = new Date();
today.setHours(0, 0, 0, 0); // Normalize to start of day

// ── Helpers ───────────────────────────────────────────────────────────────
function weekOfMonth(date) {
  return Math.ceil(date.getDate() / 7);
}

function isSeasonActive(date) {
  const m = date.getMonth() + 1; // 1-12
  return MONTHS_ACTIVE.includes(m);
}

function formatTime(t) {
  if (!t) return '';
  const [h, m] = t.split(':');
  const hour = parseInt(h);
  return `${hour % 12 || 12}:${m} ${hour < 12 ? 'AM' : 'PM'}`;
}

function formatDate(date) {
  const dayName = DAY_FULL[date.getDay()];
  const month = MONTHS[date.getMonth()];
  const day = date.getDate();
  return `${dayName}, ${month} ${day}`;
}

function formatShortDate(date) {
  const month = date.getMonth() + 1;
  const day = date.getDate();
  return `${month}/${day}`;
}

function isSameDay(date1, date2) {
  return date1.getFullYear() === date2.getFullYear() &&
         date1.getMonth() === date2.getMonth() &&
         date1.getDate() === date2.getDate();
}

function weekDescription(row) {
  const weeks = [1,2,3,4,5].filter(n => row[`week_${n}`] === 't').map(n => `wk ${n}`);
  if (weeks.length === 5 || row.every_day === 't') return 'every week';
  if (weeks.length === 0) return '';
  return weeks.join(', ');
}

function isScheduledOnDate(row, date) {
  const dayCol  = DAYS[date.getDay()];
  const weekCol = `week_${weekOfMonth(date)}`;
  if (row.every_day === 't') return true;
  return row[dayCol] === 't' && row[weekCol] === 't';
}

function getDayDate(dayIndex) {
  const date = new Date(today);
  date.setDate(today.getDate() + (weekOffset * 7) + dayIndex);
  return date;
}

// ── Build UI ──────────────────────────────────────────────────────────────
function buildDayFilters() {
  const container = document.getElementById('day-filters');
  container.innerHTML = '';

  for (let i = 0; i < 7; i++) {
    const date = getDayDate(i);
    const dayName = DAY_LABELS[date.getDay()];
    const shortDate = formatShortDate(date);
    const isToday = isSameDay(date, today);

    const btn = document.createElement('button');
    btn.className = 'day-btn' +
      (isToday ? ' today-btn' : '') +
      (i === selectedDayIndex ? ' active' : '');

    btn.innerHTML = `
      <span class="day-name">${dayName}</span>
      <span class="day-date">${shortDate}</span>
      ${isToday ? '<span class="today-badge">Today</span>' : ''}
    `;

    btn.addEventListener('click', () => {
      selectedDayIndex = i;
      buildDayFilters();
      render();
    });
    container.appendChild(btn);
  }
}

function buildSideFilters() {
  const container = document.getElementById('side-filters');
  const sides = [
    { key: 'all', label: 'All' },
    { key: 'odd',  label: '⬡ Odd' },
    { key: 'even', label: '⬢ Even' },
  ];
  container.innerHTML = '';
  sides.forEach(s => {
    const btn = document.createElement('button');
    btn.textContent = s.label;
    btn.className = 'side-btn' + (selectedSide === s.key ? ` active-${s.key}` : '');
    btn.addEventListener('click', () => {
      selectedSide = s.key;
      buildSideFilters();
      render();
    });
    container.appendChild(btn);
  });
}

function render() {
  const selectedDate = getDayDate(selectedDayIndex);
  const isToday = isSameDay(selectedDate, today);

  // Filter streets
  let filtered = allStreets.filter(row => isScheduledOnDate(row, selectedDate));
  if (selectedSide === 'odd')  filtered = filtered.filter(r => r.side && r.side.toLowerCase() === 'odd');
  if (selectedSide === 'even') filtered = filtered.filter(r => r.side && r.side.toLowerCase() === 'even');

  // Sort by street name
  filtered.sort((a, b) => a.st_name.localeCompare(b.st_name));

  // Status
  const dateStr = formatDate(selectedDate);
  const countEl = document.getElementById('status-count');
  countEl.innerHTML = `<strong>${filtered.length}</strong> street${filtered.length !== 1 ? 's' : ''} cleaned on <strong>${dateStr}</strong>`;

  // Render cards
  const content = document.getElementById('content');
  if (filtered.length === 0) {
    content.innerHTML = `
      <div class="street-grid">
        <div class="empty">No streets scheduled for ${dateStr}${selectedSide !== 'all' ? ` (${selectedSide} side)` : ''}.</div>
      </div>`;
    return;
  }

  // Group by street name to merge odd+even rows
  const byStreet = {};
  filtered.forEach(row => {
    const key = row.st_name;
    if (!byStreet[key]) byStreet[key] = [];
    byStreet[key].push(row);
  });

  const cards = Object.entries(byStreet).map(([name, rows]) => {
    const sides = [...new Set(rows.map(r => r.side).filter(Boolean))];
    const sideClass = sides.length > 1 ? 'both-side' : sides[0]?.toLowerCase() === 'odd' ? 'odd-side' : 'even-side';
    const pillClass = sides.length > 1 ? 'pill-both' : sides[0]?.toLowerCase() === 'odd' ? 'pill-odd' : 'pill-even';
    const sideLabel = sides.length > 1 ? 'Odd + Even' : sides[0] || '—';
    const todayClass = isToday ? ' cleaning-today' : '';

    // Collect all unique time ranges and segments
    const timeStr = [...new Set(rows.map(r => `${formatTime(r.start_time)}–${formatTime(r.end_time)}`))].join(' / ');
    const segments = rows.map(r => ({
      from: r.from || '—',
      to: r.to || '—',
      side: r.side || '—'
    }));
    const freqStr = weekDescription(rows[0]);

    // Build expanded details
    const expandedDetails = segments.map((seg, idx) => `
      <div class="detail-row">
        <span class="detail-icon">•</span>
        <span class="detail-text">${seg.side} side: ${seg.from} → ${seg.to}</span>
      </div>
    `).join('');

    const cardId = `card-${name.replace(/\s+/g, '-')}`;

    return `
      <div class="street-card ${sideClass}${todayClass}" id="${cardId}" onclick="toggleCard('${cardId}')">
        ${isToday ? '<div class="today-flag">🚨 Today</div>' : ''}
        <div class="card-top">
          <span class="street-name">${name}</span>
          <span class="side-pill ${pillClass}">${sideLabel}</span>
        </div>
        <div class="card-detail">
          ${timeStr ? `<div class="detail-row"><span class="detail-icon">🕐</span><span class="detail-text">${timeStr}</span></div>` : ''}
          ${freqStr ? `<span class="freq-chip">${freqStr}</span>` : ''}
        </div>
        <div class="card-expanded-details">
          ${expandedDetails}
        </div>
        <div class="expand-indicator">Click for details</div>
      </div>`;
  }).join('');

  content.innerHTML = `<div class="street-grid">${cards}</div>`;
}

function toggleCard(cardId) {
  const card = document.getElementById(cardId);
  if (card) {
    card.classList.toggle('expanded');
  }
}

// ── Week Navigation ───────────────────────────────────────────────────────
function navigateWeek(offset) {
  weekOffset += offset;
  buildDayFilters();
  render();
}

document.getElementById('prev-week').addEventListener('click', () => navigateWeek(-1));
document.getElementById('next-week').addEventListener('click', () => navigateWeek(1));

// ── Data fetching ─────────────────────────────────────────────────────────
async function loadData() {
  try {
    const res  = await fetch(DATA_URL);
    if (!res.ok) throw new Error(`HTTP ${res.status} — data file not found. Run the GitHub Action first.`);
    const json = await res.json();

    allStreets = json.streets || [];
    if (allStreets.length === 0) throw new Error('No streets found in data file');

    const updated = json.updated || '—';
    document.getElementById('last-updated').textContent = `Updated ${updated}`;

    render();

  } catch (err) {
    document.getElementById('content').innerHTML = `
      <div class="state-msg">
        <div class="big">⚠️</div>
        Could not load schedule data.<br>
        <small>${err.message}</small><br><br>
        <small>Make sure the <code>update_data</code> GitHub Action has run at least once.</small>
      </div>`;
    console.error(err);
  }
}

// ── Init ──────────────────────────────────────────────────────────────────
(function init() {
  // Header date
  const dateStr = today.toLocaleDateString('en-US', { weekday:'long', month:'long', day:'numeric', year:'numeric' });
  document.getElementById('today-label').textContent = `Today is ${dateStr}`;

  // Season badge
  const badge = document.getElementById('season-badge');
  if (isSeasonActive(today)) {
    badge.textContent = '● Program active';
    badge.className = 'season-badge season-active';
  } else {
    badge.textContent = '● Program inactive (Dec – Mar)';
    badge.className = 'season-badge season-inactive';
  }

  buildDayFilters();
  buildSideFilters();
  loadData();
})();
</script>
</body>
</html>
